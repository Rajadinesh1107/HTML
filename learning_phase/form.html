<!DOCTYPE html>
<html>
<head>
<title>Car Enquiry Form</title>
<body>
<h1>Car Enquiry Form</h1>
<form>
<label>Full Name:</label><br>
<input type="text" name="name" placeholder="Enter the name"><br><br>
<label>Email:</label><br>
<input type="email" name="email" placeholder="Enter the Email"><br><br>
<label>Phone Number:</label><br>
<input type="tel" name="phone" placeholder="Enter the number"><br><br>
<label>Select Car:</label><br>
<select>
<option>Toyota</option>
<option>Honda</option>
<option>Hyundai</option>
<option>Tata</option>
</select><br><br>
<label>Message:</label><br>
<textarea rows="4" cols="30"></textarea><br><br>
<button type="submit">Submit</button>
</form>
<br><br>
<a href="test.html">Back to Cars World</a>
</body>
</html>
